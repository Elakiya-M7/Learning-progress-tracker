{% extends "base.html" %}

{% block title %}Edit Task - DailyTrack{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">✏️ Edit Task</h4>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="title" class="form-label">Task Title</label>
                            <input type="text" class="form-control" id="title" name="title" value="{{ task.title }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="category_id" class="form-label">Category</label>
                            <select class="form-select" id="category_id" name="category_id" required>
                                {% for category in categories %}
                                <option value="{{ category.id }}" {% if category.id == task.category_id %}selected{% endif %}>
                                    {{ category.icon }} {{ category.name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="priority" class="form-label">Priority</label>
                            <select class="form-select" id="priority" name="priority">
                                <option value="Low" {% if task.priority.value == 'Low' %}selected{% endif %}>Low</option>
                                <option value="Med" {% if task.priority.value == 'Med' %}selected{% endif %}>Medium</option>
                                <option value="High" {% if task.priority.value == 'High' %}selected{% endif %}>High</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="notes" class="form-label">Notes</label>
                            <textarea class="form-control" id="notes" name="notes" rows="3">{{ task.notes or '' }}</textarea>
                        </div>

                        <div class="mb-3">
                            <label for="media" class="form-label">Update Media</label>
                            <input type="file" class="form-control" id="media" name="media" accept="image/*,video/*">
                            {% if task.media_url %}
                            <small class="text-muted">Current: <a href="{{ url_for('static', filename=task.media_url) }}" target="_blank">View</a></small>
                            {% endif %}
                        </div>

                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="is_recurring" name="is_recurring" 
                                       {% if task.is_recurring %}checked{% endif %}>
                                <label class="form-check-label" for="is_recurring">Recurring Task</label>
                            </div>
                        </div>

                        <div class="mb-3" id="recurrence-type" style="display:{% if task.is_recurring %}block{% else %}none{% endif %};">
                            <label for="recurrence_type" class="form-label">Repeat</label>
                            <select class="form-select" id="recurrence_type" name="recurrence_type">
                                <option value="none" {% if task.recurrence_type.value == 'none' %}selected{% endif %}>No repeat</option>
                                <option value="daily" {% if task.recurrence_type.value == 'daily' %}selected{% endif %}>Daily</option>
                                <option value="weekly" {% if task.recurrence_type.value == 'weekly' %}selected{% endif %}>Weekly</option>
                            </select>
                        </div>

                        <div class="btn-group w-100" role="group">
                            <button type="submit" class="btn btn-success">💾 Save Changes</button>
                            <a href="{{ url_for('tasks.today') }}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
document.getElementById('is_recurring').addEventListener('change', function() {
    document.getElementById('recurrence-type').style.display = this.checked ? 'block' : 'none';
});
</script>
{% endblock %}
